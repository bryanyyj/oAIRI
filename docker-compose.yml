version: '3.8'

services:
  survey-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: survey-app
    ports:
      - "8788:8788"
    environment:
      - NODE_ENV=production
    volumes:
      # Mount wrangler config for database binding
      - ./wrangler.toml:/app/wrangler.toml:ro
      # Optional: Mount .wrangler directory for local D1 data persistence
      - ./.wrangler:/app/.wrangler
    restart: unless-stopped
    networks:
      - survey-network

networks:
  survey-network:
    driver: bridge
